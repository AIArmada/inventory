providers:
  - Laravel\Boost\BoostServiceProvider
  - AIArmada\CommerceSupport\SupportServiceProvider
  - AIArmada\Affiliates\AffiliatesServiceProvider
  - AIArmada\Cart\CartServiceProvider
  - AIArmada\Chip\ChipServiceProvider
  - AIArmada\CashierChip\CashierChipServiceProvider
  - AIArmada\Cashier\CashierServiceProvider
  - AIArmada\Docs\DocsServiceProvider
  - AIArmada\Jnt\JntServiceProvider
  - AIArmada\Inventory\InventoryServiceProvider
  - AIArmada\Products\ProductsServiceProvider
  - AIArmada\Orders\OrdersServiceProvider
  - AIArmada\Pricing\PricingServiceProvider
  - AIArmada\Tax\TaxServiceProvider
  - AIArmada\Vouchers\VoucherServiceProvider
  - AIArmada\Shipping\ShippingServiceProvider
  - AIArmada\Customers\CustomersServiceProvider
  - AIArmada\FilamentAffiliates\FilamentAffiliatesServiceProvider
  - AIArmada\FilamentAuthz\FilamentAuthzServiceProvider
  - AIArmada\FilamentCart\FilamentCartServiceProvider
  - AIArmada\FilamentCashier\FilamentCashierServiceProvider
  - AIArmada\FilamentCashierChip\FilamentCashierChipServiceProvider
  - AIArmada\FilamentChip\FilamentChipServiceProvider
  - AIArmada\FilamentCustomers\FilamentCustomersServiceProvider
  - AIArmada\FilamentDocs\FilamentDocsServiceProvider
  - AIArmada\FilamentInventory\FilamentInventoryServiceProvider
  - AIArmada\FilamentJnt\FilamentJntServiceProvider
  - AIArmada\FilamentOrders\FilamentOrdersServiceProvider
  - AIArmada\FilamentPricing\FilamentPricingServiceProvider
  - AIArmada\FilamentProducts\FilamentProductsServiceProvider
  - AIArmada\FilamentShipping\FilamentShippingServiceProvider
  - AIArmada\FilamentTax\FilamentTaxServiceProvider
  - AIArmada\FilamentVouchers\FilamentVouchersServiceProvider

env:
  - DB_CONNECTION=sqlite
  - DB_DATABASE=database/database.sqlite
  - CACHE_STORE=file

migrations:
  - packages/affiliates/database/migrations
  - packages/cart/database/migrations
  - packages/cashier-chip/database/migrations
  - packages/chip/database/migrations
  - packages/customers/database/migrations
  - packages/docs/database/migrations
  # filament-authz migrations loaded via service provider
  - packages/filament-cart/database/migrations
  - packages/jnt/database/migrations
  - packages/inventory/database/migrations
  - packages/shipping/database/migrations
  - packages/products/database/migrations
  - packages/orders/database/migrations
  - packages/pricing/database/migrations
  - packages/tax/database/migrations
  - packages/vouchers/database/migrations

workbench:
  start: '/'
  health: false
  auth: true
  discovers:
    web: true
    api: true
    commands: true
    components: false
    factories: true
    views: true
  build:
    - purge-skeleton
    - create-sqlite-db
    - db-wipe
    - migrate:fresh
  sync: []
